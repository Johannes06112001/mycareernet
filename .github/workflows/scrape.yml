name: MyCareernet Job Scraper

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Such-Keyword (z.B. BASF)'
        required: false
        default: ''
      location:
        description: 'Standort (z.B. India, Hyderabad, Mumbai)'
        required: false
        default: 'India'
      exp:
        description: 'Erfahrung min_max (z.B. 0_5, 5_10)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python & Playwright installieren
        run: |
          pip install requests playwright --quiet
          python -m playwright install chromium --with-deps

      - name: Scrapen (Playwright holt Token, API liefert Jobs)
        run: |
          python scraper.py \
            --keyword  "${{ github.event.inputs.keyword  || '' }}" \
            --location "${{ github.event.inputs.location || 'India' }}" \
            --exp      "${{ github.event.inputs.exp      || '' }}" \
            --pages    10 \
            --output   index.html

      - name: Artifacts hochladen
        uses: actions/upload-artifact@v4
        with:
          name: mycareernet-results
          path: |
            index.html
            jobs_raw.json
            session_cache.json
          retention-days: 7

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html jobs_raw.json
          git diff --staged --quiet || git commit -m "bot: Jobs aktualisiert $(date +'%Y-%m-%d %H:%M')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy zu GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          include_files: index.html
