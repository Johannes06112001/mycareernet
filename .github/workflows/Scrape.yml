name: MyCareernet Job Scraper

on:
  schedule:
    - cron: '0 6 * * *'     # Täglich 06:00 UTC
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Such-Keyword (z.B. BASF)'
        required: false
        default: ''
      location:
        description: 'Standort (z.B. India, Hyderabad, Mumbai)'
        required: false
        default: ''
      exp:
        description: 'Erfahrung min_max (z.B. 0_5 oder 5_10)'
        required: false
        default: ''
      force_probe:
        description: 'Payload neu ermitteln (true/false)'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: self-hosted   # Dein Windows Runner umgeht die WAF

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python & Abhängigkeiten
        run: |
          pip install requests playwright --quiet
          python -m playwright install chromium --with-deps
        shell: pwsh

      # ── Schritt 1: Payload ermitteln (nur wenn kein Cache oder force_probe) ──
      - name: Payload-Probe (API-Variante ermitteln)
        if: ${{ !hashFiles('discovered_payload.json') || github.event.inputs.force_probe == 'true' }}
        run: |
          python scraper.py --probe `
            --keyword "${{ github.event.inputs.keyword || '' }}" `
            --location "${{ github.event.inputs.location || '' }}" `
            --exp "${{ github.event.inputs.exp || '' }}"
        shell: pwsh

      # ── Schritt 2: Jobs scrapen ───────────────────────────────────────────
      - name: Jobs scrapen → index.html
        run: |
          python scraper.py `
            --keyword "${{ github.event.inputs.keyword || '' }}" `
            --location "${{ github.event.inputs.location || '' }}" `
            --exp "${{ github.event.inputs.exp || '' }}" `
            --pages 10 `
            --output index.html
        shell: pwsh

      # ── Schritt 3: Ergebnisse als Artifact speichern ─────────────────────
      - name: Artifacts hochladen
        uses: actions/upload-artifact@v4
        with:
          name: mycareernet-results
          path: |
            index.html
            jobs_raw.json
            discovered_payload.json
          retention-days: 30

      # ── Schritt 4: Payload-Cache + HTML ins Repo committen ───────────────
      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add discovered_payload.json index.html jobs_raw.json
          git diff --staged --quiet || git commit -m "bot: MyCareernet Jobs aktualisiert $(Get-Date -Format 'yyyy-MM-dd HH:mm')"
          git push
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Schritt 5: Deploy zu GitHub Pages ────────────────────────────────
      - name: Deploy zu GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          include_files: index.html
